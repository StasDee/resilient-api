name: legacy-docker-tests (manual)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: legacy-docker-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  stable:
    name: Stable — local tests (no external)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra test

      - name: Pytest (stable)
        run: uv run pytest -m "not external and not concurrency" -q

  external-signal:
    name: External — signal (no stress)
    runs-on: ubuntu-latest
    needs: [stable]

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      API_TOKEN: ${{ secrets.API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra test

      - name: Check secrets present
        shell: bash
        run: |
          if [[ -z "${BASE_URL}" || -z "${API_TOKEN}" ]]; then
            echo "Missing BASE_URL/API_TOKEN secrets -> skipping external signal."
            exit 0
          fi
          echo "Secrets OK."

      - name: Pytest (external signal)
        shell: bash
        run: |
          if [[ -z "${BASE_URL}" || -z "${API_TOKEN}" ]]; then
            exit 0
          fi
          uv run pytest -m "external and not concurrency" -q

  legacy-docker:
    name: Legacy Docker — concurrency/stress (expected to fail)
    runs-on: ubuntu-latest
    needs: [external-signal]
    continue-on-error: false

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      API_TOKEN: ${{ secrets.API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Check secrets present
        shell: bash
        run: |
          if [[ -z "${BASE_URL}" || -z "${API_TOKEN}" ]]; then
            echo "Missing BASE_URL/API_TOKEN secrets -> skipping docker legacy tests."
            exit 0
          fi
          echo "Secrets OK."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        run: docker build -t mockapi-tests -f ci/Dockerfile .

      - name: Run tests in Docker (should fail workflow if failing)
        run: |
          docker run --rm \
            -e BASE_URL="$BASE_URL" \
            -e API_TOKEN="$API_TOKEN" \
            mockapi-tests