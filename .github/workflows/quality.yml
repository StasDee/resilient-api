name: quality
on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install
        run: uv sync

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy .
        continue-on-error: true  # set to false when you’re ready

      - name: Pytest (stable suite)
        run: uv run pytest -m "not external" -q