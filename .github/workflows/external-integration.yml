name: external-integration

on:
  workflow_dispatch:
    inputs:
      include_concurrency:
        description: "Also run concurrency/stress tests (rate-limit prone)"
        required: false
        default: "false"
  schedule:
    # Nightly at 03:00 UTC
    - cron: "0 3 * * *"

permissions:
  contents: read

concurrency:
  group: external-integration-${{ github.ref }}
  cancel-in-progress: false

jobs:
  smoke:
    name: Smoke — secrets & connectivity
    runs-on: ubuntu-latest
    continue-on-error: true

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      API_TOKEN: ${{ secrets.API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra test

      - name: Check secrets present
        shell: bash
        run: |
          if [[ -z "${BASE_URL}" || -z "${API_TOKEN}" ]]; then
            echo "Missing BASE_URL/API_TOKEN secrets -> skipping external tests."
            exit 0
          fi
          echo "Secrets OK."

      - name: Basic API reachability (GET /users)
        shell: bash
        run: |
          if [[ -z "${BASE_URL}" || -z "${API_TOKEN}" ]]; then
            exit 0
          fi
          uv run python - <<'PY'
          import os
          import requests

          base = os.environ["BASE_URL"].rstrip("/")
          token = os.environ["API_TOKEN"]
          url = f"{base}/users"

          r = requests.get(
              url,
              headers={"Authorization": f"Bearer {token}"},
              timeout=10,
          )
          print("GET", url, "->", r.status_code)
          # don't fail the whole workflow for flaky upstream; just show signal
          PY

  external-signal:
    name: External — signal (no stress)
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [smoke]

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      API_TOKEN: ${{ secrets.API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra test

      - name: Pytest (external signal)
        shell: bash
        run: |
          if [[ -z "${BASE_URL}" || -z "${API_TOKEN}" ]]; then
            echo "Missing BASE_URL/API_TOKEN secrets -> skipping."
            exit 0
          fi
          uv run pytest -m "external and not concurrency" -q

  concurrency:
    name: External — concurrency/stress (manual only)
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [external-signal]

    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.include_concurrency == 'true' }}

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      API_TOKEN: ${{ secrets.API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra test

      - name: Pytest (concurrency)
        shell: bash
        run: |
          if [[ -z "${BASE_URL}" || -z "${API_TOKEN}" ]]; then
            echo "Missing BASE_URL/API_TOKEN secrets -> skipping."
            exit 0
          fi
          uv run pytest -m "concurrency" -q