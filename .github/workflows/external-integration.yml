name: external-integration
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"  # nightly

jobs:
  external:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install
        run: uv sync

      - name: External integration tests (flaky upstream)
        run: uv run pytest -m external -q
        continue-on-error: true